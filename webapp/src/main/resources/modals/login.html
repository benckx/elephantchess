<div id="login-modal" class="modal-content" data-nosnippet>
    <button class="modal-close-button" aria-label="Close">×</button>
    <h2>Login</h2>
    <p>
        No account? You can <b><span id="signup-span" class="action-link">sign up</span></b>.
    </p>
    <div class="modal-form-label">
        Email or username<br/>
        <input id="login-field" type="text"/>
    </div>
    <div class="modal-form-label">
        Password<br/>
        <input id="password-field" type="password"/>
    </div>
    <div class="modal-buttons-panel">
        <input id="login-ok-button" type="button" class="app-buttons" value="ok">
    </div>
    <div class="password-recovery-link">
        <span class="sub-text"><a href="/recovery">I forgot my password</a></span>
    </div>
</div>
