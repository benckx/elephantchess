<div id="content-section-feedback-modal" class="modal-content" data-nosnippet>
    <h2>Tell us more</h2>
    <p id="content-section-feedback-section-label"></p>
    <div class="modal-form-label">
        <textarea id="content-section-feedback-textarea" rows="7" maxlength="1000"
                  placeholder="What can we improve?"></textarea>
        <span id="content-section-feedback-character-counter">0 / 1000</span>
    </div>
    <div class="modal-buttons-panel">
        <input id="content-section-feedback-submit-button" type="button" class="app-buttons" value="send">
    </div>
</div>
