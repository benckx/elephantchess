<div id="join-game-confirmation-modal" class="modal-content" data-nosnippet>
    <h2>Join Game?</h2>
    <div id="join-game-container" class="center-content-div">
        <table id="join-game-modal-table">
            <tr>
                <td class="left-side">
                    Opponent
                </td>
                <td class="right-side">
                    <span id="join-game-opponent">
                        <span id="join-game-status-indicator" class="online-status-indicator online-status-indicator-smaller"></span>
                    </span>
                </td>
            </tr>
            <tr>
                <td class="left-side">
                    Mode
                </td>
                <td class="right-side">
                    <span id="join-game-rating-mode"></span>
                </td>
            </tr>
            <tr>
                <td class="left-side">
                    Rating
                </td>
                <td class="right-side">
                    <span id="join-game-rating"></span>
                </td>
            </tr>
            <tr>
                <td class="left-side">
                    Color
                </td>
                <td class="right-side">
                    <span id="join-game-color"></span>
                </td>
            </tr>
            <tr>
                <td class="left-side">
                    Time Control
                </td>
                <td class="right-side">
                    <span id="join-game-tc"></span>
                </td>
            </tr>
        </table>
    </div>
    <div class="modal-buttons-panel">
        <input id="join-game-join-button" type="button" class="app-buttons" value="join">
        <input id="join-game-decline-button" type="button" class="app-buttons-red" value="decline">
    </div>
</div>
