<div id="play-bot-modal" class="modal-content" data-nosnippet>
    <h2>Play Bot</h2>
    <div class="new-game-main-container">
        <div class="container-with-margin">
            <table class="new-game-option-table">
                <tr>
                    <td class="icons-cells">
                        <div class="center-content-div">
                            <img src="/images/icons/dice.png"
                                 class="time-control-icons"
                                 alt="variant">
                        </div>
                    </td>
                    <td class="button-cells">
                        <div id="variant-xiangqi-bot"
                             data-variant="XIANGQI"
                             class="option-button-div bot-variant-option-button-div option-button-div-selected">
                            象 Xiangqi
                        </div>
                    </td>
                    <td class="button-cells">
                        <div id="variant-manchu-bot"
                             data-variant="MANCHU"
                             class="option-button-div bot-variant-option-button-div">
                            统 Manchu
                        </div>
                    </td>
                </tr>
                <tr>
                    <td class="icons-cells">
                        <div class="center-content-div">
                            <img src="/images/icons/contrast-circle-symbol.png"
                                 class="time-control-icons"
                                 alt="color">
                        </div>
                    </td>
                    <td class="button-cells">
                        <div id="play-as-red"
                             class="option-button-div bot-color-option-button-div option-button-div-selected red-color">
                            Red
                        </div>
                    </td>
                    <td class="button-cells">
                        <div id="play-as-black"
                             class="option-button-div bot-color-option-button-div black-color">
                            Black
                        </div>
                    </td>
                </tr>
                <tr>
                    <td class="icons-cells">
                        <div class="center-content-div">
                            <img src="/images/icons/bot-icon.png"
                                 class="time-control-icons"
                                 alt="engine">
                        </div>
                    </td>
                    <td class="button-cells">
                        <div id="engine-pika"
                             class="option-button-div bot-engine-option-button-div option-button-div-selected">
                            Pikafish
                        </div>
                    </td>
                    <td class="button-cells">
                        <div id="engine-fairy"
                             class="option-button-div bot-engine-option-button-div">
                            Fairy
                        </div>
                    </td>
                </tr>
            </table>
            <div id="play-bot-depth-box">
                <h3 class="add-asterisk">Depth</h3>
                <input id="play-bot-depth" type="range" min="1" max="14" value="6">
                <div id="play-bot-depth-value-box">
                    Depth <span id="play-bot-depth-value">6</span>/<span id="play-bot-depth-max-value">14</span>
                </div>
            </div>
            <div class="modal-form-label">
                <h3>Starting Position</h3>
                <div class="standard-radio">
                    <span>
                        <input type="radio" id="start-fen-standard" name="start-position-radio" value="Standard"
                               checked="checked">
                    </span>
                    <span class="label-span">
                        <label for="start-fen-standard">Standard</label>
                    </span>
                </div>
                <div class="standard-radio">
                    <span>
                        <input type="radio" id="start-fen-custom" name="start-position-radio" value="Custom">
                    </span>
                    <span class="label-span">
                        <label for="start-fen-custom">Custom</label>
                    </span>
                </div>
                <input id="start-fen" type="text"
                       value="rnbakabnr/9/1c5c1/p1p1p1p1p/9/9/P1P1P1P1P/1C5C1/9/RNBAKABNR w - - 0 0"
                       style="margin-top: 5px" disabled/>
            </div>
            <div class="modal-form-label">
                <h3 class="openings-heading">
                    <span>Opening Mode</span>
                    <a href="/about/faq#pvb-opening-mode" target="_blank">
                        <img src="/images/icons/question_faq.png" alt="about"/>
                    </a>
                </h3>
                <div class="standard-radio">
                    <span>
                        <input type="radio" id="opening-by-frequency" name="play-bot-opening" value="BY_FREQUENCY"
                               checked="checked">
                    </span>
                    <span class="label-span">
                        <label for="opening-by-frequency">Most Played</label>
                    </span>
                </div>
                <div class="standard-radio">
                    <span>
                        <input type="radio" id="opening-random" name="play-bot-opening" value="RANDOM">
                    </span>
                    <span class="label-span">
                        <label for="opening-random">Randomized</label>
                    </span>
                </div>
                <div class="standard-radio">
                    <span>
                        <input type="radio" id="opening-engine-only" name="play-bot-opening" value="ENGINE_ONLY">
                    </span>
                    <span class="label-span">
                        <label for="opening-engine-only">Engine Only</label>
                    </span>
                </div>
            </div>
        </div>
    </div>
    <div class="modal-buttons-panel">
        <input id="play-bot-button" type="button" class="app-buttons" value="play">
    </div>
    <div class="center-content-div">
        <div id="deeper-levels-message" class="only-guest-hidden-by-default">
            <b>*</b> If you want to be able to play with depth greater than 6, you have to
            <b><span class="action-link" onclick="showSignUpModal()">sign up</span></b>.
            Don't worry, it's free and quick!
        </div>
    </div>
</div>
