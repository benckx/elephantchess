<div id="signup-modal" class="modal-content" data-nosnippet>
    <h2>Sign Up</h2>
    <p>
        Already have an account? You can <b><span id="login-span" class="action-link">login</span></b>.
    </p>
    <div class="modal-form-label">
        <div class="signup-label-row">
            <span>Username</span>
            <span class="signup-validation-text signup-valid-text"></span>
            <span class="signup-validation-text signup-invalid-text"></span>
            <img class="signup-validation-icon signup-valid-icon" src="/images/icons/right-icon.png" alt="valid"/>
            <img class="signup-validation-icon signup-invalid-icon" src="/images/icons/wrong-icon.png" alt="invalid"/>
        </div>
        <input id="signup-username-field" type="text"/>
    </div>
    <div class="modal-form-label">
        <div class="signup-label-row">
            <span>Email</span>
            <span class="signup-validation-text signup-valid-text"></span>
            <span class="signup-validation-text signup-invalid-text"></span>
            <img class="signup-validation-icon signup-valid-icon" src="/images/icons/right-icon.png" alt="valid"/>
            <img class="signup-validation-icon signup-invalid-icon" src="/images/icons/wrong-icon.png" alt="invalid"/>
        </div>
        <input id="sign-up-email-field" type="text"/>
    </div>
    <div class="modal-form-label">
        <div class="signup-label-row">
            <span>Password</span>
            <span class="signup-validation-text signup-valid-text"></span>
            <span class="signup-validation-text signup-invalid-text"></span>
            <img class="signup-validation-icon signup-valid-icon" src="/images/icons/right-icon.png" alt="valid"/>
            <img class="signup-validation-icon signup-invalid-icon" src="/images/icons/wrong-icon.png" alt="invalid"/>
        </div>
        <input id="sign-up-password-field" type="password"/>
    </div>
    <div id="signup-transfer-games-row" class="modal-form-label">
        <label>
            <input id="signup-transfer-games-checkbox" type="checkbox" checked/>
            Transfer my games and puzzles played as guest
        </label>
    </div>
    <div id="captcha-container"></div>
    <div class="modal-buttons-panel">
        <input id="signup-button" type="button" class="app-buttons" value="sign up">
    </div>
    <div class="password-recovery-link">
        <span class="sub-text"><a href="/recovery">I forgot my password</a></span>
    </div>
</div>
