<div id="confirmation-modal" class="modal-content" data-nosnippet>
    <h2>Win</h2>
    <div class="modal-center-text">
        <div class="center-content-div">
            Your opponent has resigned! You win.
        </div>
    </div>
    <div id="rating-update-box" class="modal-form-label">
        <div class="center-content-div">
            <div id="user-rating-value-box" class="user-rating-value-box"></div>
            <div id="user-rating-delta-value-box" class="user-rating-value-box"></div>
        </div>
    </div>
    <div class="modal-buttons-panel">
        <input id="ok-button" type="button" class="app-buttons" value="ok">
    </div>
</div>
