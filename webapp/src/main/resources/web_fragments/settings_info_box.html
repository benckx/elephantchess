<div id="settings-info-box-container" class="info-box">
    <div id="settings-info-box">
        <div class="setting-option-double-item">
            <div>
                <img id="select-piece-style-traditional"
                     src="/images/pieces/traditional/black_general.png"
                     alt="Select 'Traditional' piece style"
                     loading="lazy">
            </div>
            <div>
                <img id="select-piece-style-romanized-rounded"
                     src="/images/pieces/romanized_rounded/black_general.png"
                     alt="Select 'Romanized Rounded' piece style"
                     loading="lazy">
            </div>
        </div>
        <div class="setting-option-item">
            <div>
                <img id="move-format-button"
                     src="/images/icons/types.png"
                     alt="Select move format"
                     loading="lazy">
            </div>
        </div>
        <div class="setting-option-item">
            <div>
                <img id="show-coordinates-button"
                     src="/images/icons/coordinates1.png"
                     alt="Show or hide board coordinates"
                     loading="lazy">
            </div>
        </div>
        <div class="setting-option-item">
            <div>
                <img id="play-sounds-button"
                     src="/images/icons/flash-squared.png"
                     alt="Enable or disable board sounds"
                     loading="lazy">
            </div>
        </div>
        <div class="setting-option-item">
            <div>
                <img id="flip-board-button"
                     src="/images/icons/circle-of-two-clockwise-arrows-rotation-blue.png"
                     alt="Flip board"
                     loading="lazy">
            </div>
        </div>
        <div id="show-analytics-arrows-item" class="setting-option-item">
            <div>
                <img id="show-analytics-arrows"
                     src="/images/icons/show-arrows.png"
                     alt="Show analytics arrows"
                     loading="lazy">
            </div>
        </div>
        <div id="edit-position-item" class="setting-option-item">
            <div>
                <img id="edit-position-button"
                     src="/images/icons/edit-position.png"
                     alt="Edit position"
                     loading="lazy">
            </div>
        </div>
    </div>
</div>
