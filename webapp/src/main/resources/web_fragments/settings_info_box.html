<div id="settings-info-box-container" class="info-box">
    <div id="settings-info-box">
        <div class="setting-option-double-item">
            <div>
                <img id="select-piece-style-traditional"
                     src="/images/pieces/traditional/black_general.png"
                     alt="Select 'Traditional' piece style"
                     loading="lazy">
            </div>
            <div>
                <img id="select-piece-style-romanized-rounded"
                     src="/images/pieces/romanized_rounded/black_general.png"
                     alt="Select 'Romanized Rounded' piece style"
                     loading="lazy">
            </div>
        </div>
        <div class="setting-option-item">
            <div>
                <img id="flip-board-button"
                     src="/images/icons/circle-of-two-clockwise-arrows-rotation-blue.png"
                     alt="Flip board"
                     loading="lazy">
            </div>
        </div>
        <div id="show-analytics-arrows-item" class="setting-option-item">
            <div>
                <img id="show-analytics-arrows"
                     src="/images/icons/show-arrows.png"
                     alt="Show analytics arrows"
                     loading="lazy">
            </div>
        </div>
        <div id="edit-position-item" class="setting-option-item">
            <div>
                <img id="edit-position-button"
                     src="/images/icons/edit-position.png"
                     alt="Edit position"
                     loading="lazy">
            </div>
        </div>
    </div>
    <a id="advanced-settings-toggle"
       href="#"
       aria-label="Open advanced settings">
        Advanced
    </a>
    <div id="advanced-settings-box">
        <div id="advanced-move-format-setting-item" class="advanced-setting-row">
            <div class="advanced-setting-text">
                <div class="advanced-setting-title">Move format</div>
                <div class="advanced-setting-description">Notation shown in the move list.</div>
            </div>
            <div class="advanced-setting-options">
                <label>
                    <input type="radio" name="move-format-setting" id="move-format-radio-wxf-dot" value="WXF_DOT">
                    WXF .
                </label>
                <label>
                    <input type="radio" name="move-format-setting" id="move-format-radio-wxf-equals" value="WXF_EQUALS">
                    WXF =
                </label>
                <label>
                    <input type="radio" name="move-format-setting" id="move-format-radio-pgn" value="PGN">
                    PGN
                </label>
                <label>
                    <input type="radio" name="move-format-setting" id="move-format-radio-algebraic" value="ALGEBRAIC_EN">
                    Algebraic
                </label>
            </div>
        </div>
        <div class="advanced-setting-row">
            <div class="advanced-setting-text">
                <div class="advanced-setting-title">Show coordinates</div>
                <div class="advanced-setting-description">Display board coordinates around the board edges.</div>
            </div>
            <div class="advanced-setting-options">
                <label>
                    <input type="radio" name="show-coordinates-setting" id="show-coordinates-enabled-radio" value="true">
                    On
                </label>
                <label>
                    <input type="radio" name="show-coordinates-setting" id="show-coordinates-disabled-radio" value="false">
                    Off
                </label>
            </div>
        </div>
        <div class="advanced-setting-row">
            <div class="advanced-setting-text">
                <div class="advanced-setting-title">Colorblind black pieces</div>
                <div class="advanced-setting-description">Increase contrast for black pieces.</div>
            </div>
            <div class="advanced-setting-options">
                <label>
                    <input type="radio"
                           name="colorblind-black-pieces-setting"
                           id="colorblind-friendly-black-pieces-enabled-radio"
                           value="true">
                    On
                </label>
                <label>
                    <input type="radio"
                           name="colorblind-black-pieces-setting"
                           id="colorblind-friendly-black-pieces-disabled-radio"
                           value="false">
                    Off
                </label>
            </div>
        </div>
    </div>
</div>
