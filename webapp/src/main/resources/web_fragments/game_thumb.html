<div class="game-thumb ${parentClass} game-thumb-placeholder">
    <div class="board-outer-container">
        <div class="board-inner-container">
            <a class="board-outer-container-link-mask"></a>
            <div id="last-${gameType}-game-board-${i}"
                 class="board-container mini-board-container board-container-placeholder">
            </div>
        </div>
        <div class="game-thumb-info-box">
            <div>
                <div>
                    <span class="black-player-status-indicator online-status-indicator online-status-indicator-smaller"></span>
                    <span class="game-thumb-player-name black-player-name"></span>
                    <span class="game-thumb-rating black-player-rating"></span>
                    <span class="black-player-wins"></span>
                </div>
                <div>
                    <span class="red-player-status-indicator online-status-indicator online-status-indicator-smaller"></span>
                    <span class="game-thumb-player-name red-player-name"></span>
                    <span class="game-thumb-rating red-player-rating"></span>
                    <span class="red-player-wins"></span>
                </div>
            </div>
            <div>
                <div class="game-thumb-status">--</div>
                <div class="game-thumb-last-updated">--</div>
            </div>
        </div>
    </div>
</div>
