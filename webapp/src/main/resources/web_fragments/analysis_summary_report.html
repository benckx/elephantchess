<div id="analysis-summary" class="info-box">
    <div class="help-icon">
        <a href="/about/faq#analysis-summary-report" target="_blank">
            <img src="/images/icons/question_faq.png" alt="about"/>
        </a>
    </div>
    <div id="eval-line-chart-container"></div>
    <table id="analysis-summary-table">
        <thead>
        <tr>
            <th style="width: 21%"></th>
            <th style="width: 36%">
                <div class="name-holder">
                    <div id="analysis-summary-red-player-name" class="red-color">Red</div>
                    <div id="analysis-summary-red-player-wins" class="center-content-div"></div>
                </div>
            </th>
            <th style="width: 5%">
            </th>
            <th style="width: 36%">
                <div class="name-holder">
                    <div id="analysis-summary-black-player-name" class="black-color">Black</div>
                    <div id="analysis-summary-black-player-wins" class="center-content-div"></div>
                </div>
            </th>
        </tr>
        </thead>
        <tr id="analysis-summary-brilliant-row">
            <td>Brilliant</td>
            <td class="analysis-summary-value-cell brilliant-annotation-label"></td>
            <td class="analysis-summary-value-cell brilliant-annotation-label">!!</td>
            <td class="analysis-summary-value-cell brilliant-annotation-label"></td>
        </tr>
        <tr id="analysis-summary-good-row">
            <td>Good</td>
            <td class="analysis-summary-value-cell good-annotation-label"></td>
            <td class="analysis-summary-value-cell brilliant-annotation-label">!</td>
            <td class="analysis-summary-value-cell good-annotation-label"></td>
        </tr>
        <tr id="analysis-summary-interesting-row">
            <td>Interesting</td>
            <td class="analysis-summary-value-cell interesting-annotation-label"></td>
            <td class="analysis-summary-value-cell interesting-annotation-label">!?</td>
            <td class="analysis-summary-value-cell interesting-annotation-label"></td>
        </tr>
        <tr id="analysis-summary-inaccuracy-row">
            <td>Inaccuracies</td>
            <td class="analysis-summary-value-cell inaccuracy-annotation-label"></td>
            <td class="analysis-summary-value-cell inaccuracy-annotation-label">?!</td>
            <td class="analysis-summary-value-cell inaccuracy-annotation-label"></td>
        </tr>
        <tr id="analysis-summary-mistake-row">
            <td>Mistakes</td>
            <td class="analysis-summary-value-cell mistake-annotation-label"></td>
            <td class="analysis-summary-value-cell mistake-annotation-label">?</td>
            <td class="analysis-summary-value-cell mistake-annotation-label"></td>
        </tr>
        <tr id="analysis-summary-blunder-row">
            <td>Blunders</td>
            <td class="analysis-summary-value-cell blunder-annotation-label"></td>
            <td class="analysis-summary-value-cell blunder-annotation-label">??</td>
            <td class="analysis-summary-value-cell blunder-annotation-label"></td>
        </tr>
    </table>
</div>
