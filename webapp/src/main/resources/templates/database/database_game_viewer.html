<html lang="en">
<head>
    {{header_init}}
    <title>{{page_title}} – Chinese Chess (Xiangqi) Database Game</title>
    {{description_meta}}
    {{meta_no_index}}
    <link rel="stylesheet" href="/css/database/database-game-viewer.css"/>
    {{apex_charts}}
    {{board_js}}
    <script defer src="/js/database/database-player-utils.js"></script>
    <script defer src="/js/database/database-game-viewer.js"></script>
</head>
<body data-game-id="{{game_id_attr}}"
      data-orientation="{{game_orientation}}"
      data-final-fen="{{game_final_fen}}"
      data-pgn-red-player="{{pgn_red_player}}"
      data-pgn-black-player="{{pgn_black_player}}"
      data-pgn-event="{{pgn_event}}"
      data-pgn-date="{{pgn_date}}"
      data-pgn-result="{{pgn_result}}">
{{body_init}}
<div class="flex-triptych-container">
    <div class="flex-triptych-left-container">
        <div id="mobile-navigation-panel" class="navigation-panel mobile-navigation-panel only-mobile"></div>
        <div class="info-box">
            <table class="info-box-table">
                <tbody>
                <tr>
                    <td class="icon-cell">
                        <img src="/images/icons/servers.png" alt="database"/>
                    </td>
                    <td class="description-cell">
                        <div id="players-info">{{players_info}}</div>
                        <div id="game-date-info">{{game_date_info}}</div>
                        <div id="game-event-info">{{game_event_info}}</div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
        {{analysis_summary_report}}
        <div id="analysis-button-container-left-side">
            <input type="button" value="Analyze" id="analyze-button-left-side" class="app-buttons-bigger"/>
        </div>
    </div>
    <div class="flex-triptych-board-container">
        <div id="board-container" class="board-container"></div>
    </div>
    <div class="flex-triptych-right-container">
        {{settings_info_box}}
        <div id="move-tree-container" class="move-tree-container"></div>
        <div id="move-history-navigation-panel" class="navigation-panel only-desktop"></div>
        <div id="analysis-button-container-right-side">
            <input type="button" value="Analyze" id="analyze-button-right-side" class="app-buttons-bigger"/>
        </div>
    </div>
</div>
</body>
</html>
