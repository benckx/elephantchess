<html lang="en">
<head>
    {{header_init}}
    <title>Chinese Chess (Xiangqi) Simple Board – elephantchess.io</title>
    <meta name="description" content="Simple Chinese Chess (Xiangqi) board tool to test positions or play in real life on a tablet. Free, no download, runs in your browser.">
    {{board_js}}
    <script defer src="/js/simple-board.js"></script>
</head>
<body>
{{body_init}}
<div class="flex-triptych-container">
    <div class="flex-triptych-left-container">
        <div class="info-box">
            <table class="info-box-table">
                <tbody>
                <tr>
                    <td class="icon-cell">
                        <img src="/images/icons/simple-grid.svg" alt="chess"/>
                    </td>
                    <td class="description-cell">
                        Just a simple board tool to test positions or play IRL on a tablet.
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="flex-triptych-board-container">
        <div id="board-container" class="board-container"></div>
    </div>

    <div class="flex-triptych-right-container">
        {{settings_info_box}}
    </div>
</div>
{{logged_as_guest_message}}
</body>
</html>
