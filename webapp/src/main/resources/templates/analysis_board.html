<html lang="en">
<head>
    {{header_init}}
    <title>Analysis Board</title>
    <meta name="description"
          content="Complete Chinese chess (Xiangqi) Analysis Board tool with engine analysis, opening repository, game variations (move tree), comments, import your moves in PGN or UCI.">
    <link rel="stylesheet" href="/css/analysis-board.css">
    <link rel="stylesheet" href="/css/position-editor.css">
    {{board_js}}
    <script defer src="/js/modules/parser-common.js"></script>
    <script defer src="/js/modules/parser-pgn.js"></script>
    <script defer src="/js/modules/parser-uci.js"></script>
    <script defer src="/js/modules/parser-wxf.js"></script>
    <script defer src="/js/modal-handlers/import-moves-handler.js"></script>
    <script defer src="/js/modal-handlers/position-editor-handler.js"></script>
    <script defer src="/js/widgets/bar-indicator.js"></script>
    <script defer src="/js/analysis-board/analysis-board-dto.js"></script>
    <script defer src="/js/analysis-board/analysis-board-client.js"></script>
    <script defer src="/js/analysis-board/analysis-cache.js"></script>
    <script defer src="/js/analysis-board/annotation.js"></script>
    <script defer src="/js/analysis-board/engine-analysis-widget.js"></script>
    <script defer src="/js/analysis-board/move-history-drop-down-menu.js"></script>
    <script defer src="/js/analysis-board/opening-repository-widget.js"></script>
    <script defer src="/js/analysis-board/analysis-board.js"></script>
</head>
<body>
{{body_init}}
<div class="flex-triptych-container">
    <div class="flex-triptych-left-container">
        <div id="mobile-navigation-panel" class="navigation-panel mobile-navigation-panel only-mobile"></div>
        <div id="persist-options" class="info-box">
            <div id="analysis-name-block">
                <input id="analysis-name" type="text" value="no title"/>
                <input type="button" id="rename-analysis-button" class="app-buttons app-buttons-disabled"
                       value="rename">
            </div>
            <table class="info-box-sub-table" style="margin-top: 10px">
                <tr>
                    <td class="labels">Version</td>
                    <td class="values">
                        <span id="analysis-version-label">--</span>
                    </td>
                </tr>
                <tr>
                    <td class="labels">Updated</td>
                    <td class="values">
                        <span id="analysis-version-last-updated-label">--</span>
                    </td>
                </tr>
            </table>
            <div class="center-content-div" style="margin-top: 10px">
                <input type="button" id="save-analysis-button" class="app-buttons"
                       value="save analysis">
            </div>
        </div>
        <div id="opening-repository-container">
            <div id="opening-repository-container-loading-mask">
                <div id="opening-repository-mask-label-indicator"></div>
            </div>
            <table id="opening-repository-table">
                <tbody></tbody>
            </table>
        </div>
        <div id="engine-eval-info-box" class="info-box">
            <div id="eval-bar-container"></div>
            <div id="engine-pv"></div>
            <div id="engine-raw-line"></div>
            <span id="engine-depth" class="sub-text"></span>
        </div>
        <div id="game-info-box" class="info-box">
            <table class="info-box-table">
                <tbody>
                <tr>
                    <td class="icon-cell">
                        <img src="/images/icons/pie-chart.png" id="game-type-icon" alt="game-type"/>
                    </td>
                    <td class="description-cell">
                        <span id="game-info"></span>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
        <div id="info-about-analysis" class="info-box"></div>
    </div>
    <div class="flex-triptych-board-container">
        <div id="board-container" class="board-container"></div>
        <div id="fen-export-info-box" class="info-box center-content-div">
            <input id="fen-export-input" type="text" readonly="readonly"/>
            <img id="fen-copy-icon" src="/images/icons/copy.png" class="icons">
        </div>
    </div>
    <div class="flex-triptych-right-container">
        {{settings_info_box}}
        <div id="move-tree-container" class="move-tree-container"></div>
        <div id="move-history-navigation-panel" class="navigation-panel only-desktop"></div>
        <div id="analysis-progress-bar-box">
            The game is being analyzed on our servers
            <br/>
            <div id="analysis-progress-bar-container"></div>
        </div>
        {{analysis_summary_report}}
    </div>
</div>
<div id="annotation-box-analysis" class="analysis-annotation analysis-annotation-hidden">
    <div class="analysis-annotation-close">
        X
    </div>
    <div class="analysis-annotation-header draggable center-content-div">
        <div>Annotation</div>
        <div id="annotation-move-placeholder"></div>
    </div>
    <div class="text-area-container">
        <textarea maxlength="2000"></textarea>
    </div>
    <div id="character-counter" class="character-counter">0 / 2000</div>
</div>
{{logged_as_guest_message}}
</body>
</html>
