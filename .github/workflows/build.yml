name: Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  # Opt in to Node.js 24 for JavaScript-based actions
  # (silences the Node.js 20 deprecation warning until all actions ship Node 24 builds).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Verify Docker is available (for Testcontainers)
        run: docker version

      - name: Clean build
        run: ./gradlew clean build --no-daemon --stacktrace

      - name: Verify guest PvP UCI regression test ran in build
        run: |
          python - <<'PY'
          import glob
          import xml.etree.ElementTree as ET

          test_name = "guestPlayersCanPlayFullPvPGameFromUciSample()"
          files = glob.glob("webapp-service-layer/build/test-results/test/TEST-*.xml")

          for path in files:
              root = ET.parse(path).getroot()
              for testcase in root.findall(".//testcase"):
                  if testcase.attrib.get("name") == test_name:
                      if testcase.find("failure") is not None:
                          raise SystemExit(f"{test_name} failed in {path}")
                      if testcase.find("skipped") is not None:
                          raise SystemExit(f"{test_name} was skipped in {path}")
                      print(f"Verified: {test_name} passed in {path}")
                      raise SystemExit(0)

          raise SystemExit(f"Could not find {test_name} in JUnit reports")
          PY

      - name: Publish test report
        if: always()
        uses: mikepenz/action-junit-report@v6
        with:
          report_paths: '**/build/test-results/test/TEST-*.xml'
          check_name: 'Test results'
          detailed_summary: true
          include_passed: true
          flaky_summary: true
          require_tests: false
          annotate_notice: false
          updateComment: true
          job_summary: true

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports
          path: '**/build/reports/tests/**'
          if-no-files-found: ignore
