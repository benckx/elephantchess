name: Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  # Opt in to Node.js 24 for JavaScript-based actions
  # (silences the Node.js 20 deprecation warning until all actions ship Node 24 builds).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Verify Docker is available (for Testcontainers)
        run: docker version

      - name: Clean build
        run: ./gradlew clean build --no-daemon --stacktrace

      - name: Publish test report
        if: always()
        uses: mikepenz/action-junit-report@v6
        with:
          report_paths: '**/build/test-results/test/TEST-*.xml'
          check_name: 'Test results'
          detailed_summary: true
          include_passed: true
          flaky_summary: true
          require_tests: false
          annotate_notice: false
          updateComment: true
          job_summary: true

      - name: Publish detailed test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          check_name: 'Test results (detailed)'
          junit_files: '**/build/test-results/test/TEST-*.xml'
          comment_mode: always
          report_individual_runs: true
          deduplicate_classes_by_file_name: false

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports
          path: '**/build/reports/tests/**'
          if-no-files-found: ignore
